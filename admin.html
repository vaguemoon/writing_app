<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太平國小｜教師管理後台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root {
  --blue:    #2563eb;
  --blue-lt: #eff6ff;
  --blue-dk: #1e40af;
  --green:   #16a34a;
  --green-lt:#f0fdf4;
  --yellow:  #ca8a04;
  --yel-lt:  #fefce8;
  --red:     #dc2626;
  --red-lt:  #fef2f2;
  --gray:    #64748b;
  --gray-lt: #f8fafc;
  --border:  #e2e8f0;
  --text:    #0f172a;
  --muted:   #94a3b8;
  --white:   #ffffff;
  --shadow:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --radius:  12px;
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Nunito','Noto Sans TC',sans-serif;
  background:#f1f5f9; color:var(--text);
  min-height:100vh;
}



/* ══ 後台主畫面 ══ */
#admin-screen { display:block; min-height:100vh; }

/* 頂部導覽列 */
.admin-topbar {
  background:white; border-bottom:1px solid var(--border);
  padding:0 24px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  box-shadow:var(--shadow);
}
.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-brand-icon { font-size:1.4rem; }
.topbar-brand-name { font-size:1rem; font-weight:900; color:var(--blue-dk); }
.topbar-brand-sub  { font-size:.72rem; color:var(--muted); font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.btn-logout {
  padding:7px 14px; border:1.5px solid var(--border); border-radius:8px;
  background:white; font-size:.82rem; font-weight:700; cursor:pointer;
  color:var(--gray); font-family:inherit; transition:all .15s;
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }

/* 主內容區 */
.admin-main { padding:24px; max-width:1100px; margin:0 auto; }

/* 分頁 Tab */
.admin-tabs {
  display:flex; gap:4px; background:white; padding:4px;
  border-radius:12px; border:1px solid var(--border);
  margin-bottom:20px; width:fit-content;
}
.admin-tab {
  padding:9px 20px; border-radius:9px; border:none;
  font-family:inherit; font-size:.88rem; font-weight:800;
  cursor:pointer; transition:all .15s; color:var(--gray);
  background:transparent;
}
.admin-tab.active { background:var(--blue); color:white; }

/* 卡片 */
.card {
  background:white; border-radius:var(--radius);
  border:1px solid var(--border); box-shadow:var(--shadow);
  padding:20px;
}
.card-title {
  font-size:1rem; font-weight:900; color:var(--text);
  margin-bottom:16px; display:flex; align-items:center; gap:8px;
}

/* ══ 生字設定區 ══ */
.lesson-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:600px){ .lesson-grid { grid-template-columns:1fr; } }

.lesson-input-area {
  border:2px solid var(--border); border-radius:10px;
  padding:14px 16px; font-size:1.3rem;
  font-family:'Noto Sans TC',sans-serif;
  width:100%; outline:none; letter-spacing:6px;
  transition:border-color .2s; color:var(--text);
  background:var(--gray-lt);
}
.lesson-input-area:focus { border-color:var(--blue); background:white; }

.lesson-preview {
  display:flex; gap:10px; flex-wrap:wrap; min-height:56px;
  align-items:center; padding:10px 0;
}
.lesson-char-chip {
  background:var(--blue-lt); color:var(--blue-dk);
  border-radius:8px; padding:6px 12px;
  font-size:1.4rem; font-family:'Noto Sans TC',serif; font-weight:900;
  border:2px solid #bfdbfe;
}
.lesson-empty { color:var(--muted); font-size:.85rem; font-weight:600; }

.btn-save-lesson {
  padding:11px 24px; border:none; border-radius:10px;
  background:linear-gradient(135deg,var(--green),#15803d);
  color:white; font-size:.95rem; font-weight:800;
  cursor:pointer; font-family:inherit; transition:all .15s;
  display:flex; align-items:center; gap:7px;
  box-shadow:0 3px 10px rgba(22,163,74,.3);
}
.btn-save-lesson:hover { transform:translateY(-1px); }
.btn-save-lesson:active { transform:scale(.97); }

.current-lesson-banner {
  background:var(--green-lt); border:1.5px solid #86efac;
  border-radius:10px; padding:12px 16px;
  display:flex; align-items:center; gap:10px;
  font-size:.88rem; font-weight:700; color:var(--green);
}

/* ══ 班級總覽 ══ */
.stats-row {
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  margin-bottom:20px;
}
@media(max-width:500px){ .stats-row { grid-template-columns:1fr 1fr; } }
.stat-card {
  background:white; border-radius:var(--radius);
  border:1px solid var(--border); padding:16px;
  text-align:center;
}
.stat-num  { font-size:2rem; font-weight:900; line-height:1; }
.stat-lbl  { font-size:.75rem; font-weight:700; color:var(--muted); margin-top:4px; }
.stat-blue   .stat-num { color:var(--blue); }
.stat-green  .stat-num { color:var(--green); }
.stat-yellow .stat-num { color:var(--yellow); }

/* 學生列表 */
.student-table { width:100%; border-collapse:collapse; }
.student-table th {
  text-align:left; font-size:.75rem; font-weight:800;
  color:var(--muted); padding:8px 12px;
  border-bottom:2px solid var(--border);
  text-transform:uppercase; letter-spacing:.5px;
}
.student-table td {
  padding:12px; border-bottom:1px solid var(--border);
  font-size:.9rem; font-weight:600;
  vertical-align:middle;
}
.student-table tr:last-child td { border-bottom:none; }
.student-table tr:hover td { background:#f8fafc; cursor:pointer; }

.progress-mini {
  height:8px; background:#e2e8f0; border-radius:20px;
  overflow:hidden; width:120px; display:inline-block;
}
.progress-mini-fill { height:100%; border-radius:20px; background:var(--green); }

.badge {
  display:inline-block; padding:3px 9px; border-radius:20px;
  font-size:.72rem; font-weight:800;
}
.badge-green  { background:var(--green-lt); color:var(--green); }
.badge-yellow { background:var(--yel-lt); color:var(--yellow); }
.badge-gray   { background:#f1f5f9; color:var(--muted); }

/* ══ 學生詳細頁 ══ */
.back-btn {
  display:flex; align-items:center; gap:6px;
  background:none; border:none; cursor:pointer;
  font-size:.88rem; font-weight:800; color:var(--blue);
  font-family:inherit; padding:0; margin-bottom:16px;
}
.back-btn:hover { text-decoration:underline; }

.student-detail-header {
  display:flex; align-items:center; gap:14px; margin-bottom:20px;
}
.student-avatar {
  width:52px; height:52px; border-radius:50%;
  background:var(--blue-lt); border:3px solid #bfdbfe;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; font-weight:900; color:var(--blue-dk);
}
.student-name-wrap .name { font-size:1.2rem; font-weight:900; }
.student-name-wrap .sub  { font-size:.8rem; color:var(--muted); font-weight:600; }

.char-status-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;
}
.char-status-item {
  border-radius:10px; padding:12px 8px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  border:2px solid transparent;
}
.char-status-item.mastered  { background:var(--green-lt); border-color:#86efac; }
.char-status-item.practiced { background:var(--yel-lt);   border-color:#fde047; }
.char-status-item.new       { background:#f8fafc; border-color:var(--border); }
.char-glyph { font-size:2rem; font-family:'Noto Sans TC',serif; font-weight:900; line-height:1; }
.char-lbl   { font-size:.68rem; font-weight:800; }
.char-status-item.mastered  .char-lbl { color:var(--green); }
.char-status-item.practiced .char-lbl { color:var(--yellow); }
.char-status-item.new       .char-lbl { color:var(--muted); }

/* 編輯按鈕 */
.btn-edit {
  padding:6px 14px; border-radius:8px; border:1.5px solid var(--border);
  background:white; font-size:.8rem; font-weight:700; cursor:pointer;
  font-family:inherit; transition:all .15s; color:var(--gray);
}
.btn-edit:hover { border-color:var(--blue); color:var(--blue); }
.btn-danger {
  padding:6px 14px; border-radius:8px; border:1.5px solid #fecaca;
  background:#fff5f5; font-size:.8rem; font-weight:700; cursor:pointer;
  font-family:inherit; color:var(--red); transition:all .15s;
}
.btn-danger:hover { background:#fee2e2; }
.pin-display-box {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--blue-lt); border-radius:8px; padding:6px 14px;
  font-size:1rem; font-weight:900; color:var(--blue-dk);
  letter-spacing:3px; border:1.5px solid #bfdbfe;
}
.char-status-item { cursor:pointer; transition:all .15s; }
.char-status-item:hover { transform:scale(1.06); }
.char-status-item.selecting { outline:3px solid var(--blue); outline-offset:2px; }

/* 課程管理 */
.version-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  border-radius:10px; border:1.5px solid var(--border);
  margin-bottom:8px; cursor:pointer; transition:all .15s;
  background:white;
}
.version-item:hover { border-color:var(--blue); background:var(--blue-lt); }
.version-item.active { border-color:var(--blue); background:var(--blue-lt); }
.version-name { font-size:.92rem; font-weight:800; color:var(--text); flex:1; }
.version-meta { font-size:.75rem; color:var(--muted); font-weight:600; }

.book-section { margin-bottom:16px; }
.book-title {
  font-size:.88rem; font-weight:900; color:var(--blue-dk);
  background:var(--blue-lt); border-radius:8px; padding:7px 12px;
  margin-bottom:8px;
}
.lesson-item {
  display:flex; align-items:center; gap:10px; padding:8px 12px;
  border-radius:8px; border:1px solid var(--border); margin-bottom:6px;
  background:white; font-size:.85rem;
}
.lesson-num  { font-weight:900; color:var(--blue-dk); min-width:50px; }
.lesson-name { font-weight:700; color:var(--gray); min-width:60px; }
.lesson-chars{ font-size:.95rem; font-family:'Noto Sans TC',serif; font-weight:700; letter-spacing:3px; flex:1; }
.lesson-actions { display:flex; gap:6px; }
.btn-tiny {
  padding:3px 8px; border-radius:6px; border:1px solid var(--border);
  background:white; font-size:.72rem; font-weight:700; cursor:pointer;
  font-family:inherit; color:var(--gray); transition:all .15s;
}
.btn-tiny:hover { border-color:var(--red); color:var(--red); }

/* 載入動畫 */
.spinner {
  width:28px; height:28px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--blue);
  animation:spin .7s linear infinite; margin:0 auto;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-wrap { padding:40px; text-align:center; color:var(--muted); font-weight:700; }

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px);
  background:var(--text); color:white; border-radius:10px;
  padding:11px 22px; font-size:.9rem; font-weight:700;
  opacity:0; transition:all .3s ease; z-index:999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>



<!-- ══ 後台主畫面 ══ -->
<div id="admin-screen">

  <!-- 頂部列 -->
  <div class="admin-topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">🏫</div>
      <div>
        <div class="topbar-brand-name">太平國小 教師後台</div>
        <div class="topbar-brand-sub">國字學習管理系統</div>
      </div>
    </div>
    <div class="topbar-right">
      <span style="font-size:.82rem;font-weight:700;color:var(--muted)" id="last-update"></span>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- 分頁 -->
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-overview"    onclick="switchTab('overview')">📊 班級總覽</button>
      <button class="admin-tab"        id="tab-lesson"     onclick="switchTab('lesson')">📝 設定生字</button>
      <button class="admin-tab"        id="tab-curriculum" onclick="switchTab('curriculum')">📚 課程管理</button>
    </div>

    <!-- 班級總覽 -->
    <div id="panel-overview">
      <div class="stats-row">
        <div class="stat-card stat-blue">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-lbl">學生總數</div>
        </div>
        <div class="stat-card stat-green">
          <div class="stat-num" id="stat-active">—</div>
          <div class="stat-lbl">今日活躍</div>
        </div>
        <div class="stat-card stat-yellow">
          <div class="stat-num" id="stat-mastered">—</div>
          <div class="stat-lbl">平均掌握字數</div>
        </div>
      </div>

      <!-- 學生列表 -->
      <div class="card">
        <div class="card-title">👥 學生列表
          <button onclick="loadStudents()" style="margin-left:auto;padding:5px 12px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit">🔄 重新整理</button>
        </div>
        <div id="student-list-wrap">
          <div class="loading-wrap"><div class="spinner"></div><br>載入中…</div>
        </div>
      </div>
    </div>

    <!-- 設定生字 -->
    <div id="panel-lesson" style="display:none">
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📋 目前的生字</div>
        <div id="current-lesson-display">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">✏️ 設定今日生字</div>
        <div class="lesson-grid">
          <div>
            <label style="font-size:.8rem;font-weight:800;color:var(--muted);display:block;margin-bottom:8px">輸入漢字（最多 20 個）</label>
            <input class="lesson-input-area" id="lesson-input"
              type="text" maxlength="20"
              placeholder="例如：山水火土木"
              oninput="updateLessonPreview()">
          </div>
          <div>
            <label style="font-size:.8rem;font-weight:800;color:var(--muted);display:block;margin-bottom:8px">預覽</label>
            <div class="lesson-preview" id="lesson-preview">
              <span class="lesson-empty">輸入文字後這裡會顯示預覽</span>
            </div>
          </div>
        </div>
        <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
          <button class="btn-save-lesson" onclick="saveLesson()">
            <span>💾</span><span>儲存並套用</span>
          </button>
          <span style="font-size:.8rem;color:var(--muted);font-weight:600">儲存後所有學生下次登入會自動載入這組生字</span>
        </div>
      </div>
    </div>

    <!-- 課程管理 -->
    <div id="panel-curriculum" style="display:none">

      <!-- 版本選擇 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">📚 課程版本
          <button class="btn-edit" style="margin-left:auto" onclick="showAddVersion()">＋ 新增版本</button>
        </div>
        <div id="version-list-wrap">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
        <!-- 新增版本表單 -->
        <div id="add-version-form" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input id="new-version-name" type="text" placeholder="例如：太平國小112學年"
              style="flex:1;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.92rem;font-family:inherit;outline:none;min-width:180px">
            <button class="btn-save-lesson" style="padding:9px 18px" onclick="addVersion()">
              <span>＋</span><span>建立</span>
            </button>
            <button class="btn-edit" onclick="hideAddVersion()">取消</button>
          </div>
        </div>
      </div>

      <!-- CSV 上傳 -->
      <div class="card" style="margin-bottom:16px" id="csv-upload-card">
        <div class="card-title">📥 批次匯入課程（CSV）</div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:14px;font-size:.82rem;font-weight:600;color:var(--gray);line-height:1.8">
          <strong>CSV 格式範例：</strong><br>
          冊,課,課名,生字<br>
          1,1,第一課,山水火土木<br>
          1,2,第二課,日月星雲風<br>
          2,1,第一課,春夏秋冬
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:.8rem;font-weight:800;color:var(--muted);display:block;margin-bottom:6px">選擇要匯入的版本</label>
          <select id="csv-version-select"
            style="width:100%;border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.92rem;font-family:inherit;outline:none;background:white;color:var(--text)">
            <option value="">— 請先選擇版本 —</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:8px;padding:10px 18px;border:2px dashed var(--border);border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:700;color:var(--gray);transition:all .15s"
            id="csv-label" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">
            <span>📎</span><span id="csv-filename">選擇 CSV 檔案</span>
            <input type="file" accept=".csv" id="csv-file" style="display:none" onchange="onCSVSelected()">
          </label>
          <button class="btn-save-lesson" onclick="importCSV()" id="btn-import-csv" disabled
            style="opacity:.5;cursor:not-allowed">
            <span>📥</span><span>匯入</span>
          </button>
        </div>
        <div id="csv-preview" style="margin-top:12px"></div>
      </div>

      <!-- 課程內容瀏覽 -->
      <div class="card" id="curriculum-browse-card" style="display:none">
        <div class="card-title">
          <span id="browse-version-name">課程內容</span>
          <button class="btn-danger" style="margin-left:auto;font-size:.75rem;padding:4px 10px" onclick="deleteVersion()">🗑 刪除此版本</button>
        </div>
        <div id="curriculum-content"></div>
      </div>
    </div>

    <!-- 學生詳細頁 -->
    <div id="panel-student" style="display:none">
      <button class="back-btn" onclick="backToOverview()">← 返回班級總覽</button>
      <div class="student-detail-header">
        <div class="student-avatar" id="detail-avatar"></div>
        <div class="student-name-wrap">
          <div class="name" id="detail-name"></div>
          <div class="sub" id="detail-sub"></div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn-danger" onclick="deleteStudent()">🗑 刪除學生</button>
        </div>
      </div>

      <!-- PIN 碼查詢 -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">🔐 PIN 碼查詢</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-size:.88rem;font-weight:700;color:var(--gray)">學生的 PIN 碼：</span>
          <div class="pin-display-box" id="detail-pin">—</div>
          <span style="font-size:.8rem;color:var(--muted);font-weight:600">（可告知學生讓他登入）</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📚 學習狀態
          <span style="font-size:.75rem;color:var(--muted);font-weight:600;margin-left:6px">點擊字卡可切換狀態</span>
          <button class="btn-edit" style="margin-left:auto" onclick="saveCharStatus()">💾 儲存變更</button>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
          <span class="badge badge-green">✓ 已掌握</span>
          <span class="badge badge-yellow">◎ 練習中</span>
          <span class="badge badge-gray">○ 未學習</span>
        </div>
        <div class="char-status-grid" id="detail-chars"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ══ Firebase 設定 ══
var firebaseConfig = {

var fbInitTries = 0;
function initFirebase() {
  fbInitTries++;
  // 超過 20 次（3秒）還沒好，顯示錯誤
  if (fbInitTries > 20) {
    showFirebaseError('Firebase SDK 載入失敗，請檢查網路連線後重新整理頁面。');
    return;
  }
  if (typeof firebase === 'undefined' || typeof firebase.firestore === 'undefined') {
    setTimeout(initFirebase, 150); return;
  }
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    onFirebaseReady();
  } catch(e) {
    console.warn('Firebase init error:', e);
    showFirebaseError('Firebase 初始化錯誤：' + e.message);
  }
}

function onFirebaseReady() {
  var errBar = document.getElementById('fb-error-bar');
  if (errBar) errBar.style.display = 'none';

  // 先顯示診斷訊息
  var wrap = document.getElementById('student-list-wrap');
  if (wrap) wrap.innerHTML = '<div class="loading-wrap">✅ Firebase 連線成功，讀取資料中…</div>';

  // 測試能否讀取 Firestore
  db.collection('students').limit(1).get()
    .then(function() {
      loadStudents();
      loadCurrentLesson();
    })
    .catch(function(e) {
      if (wrap) wrap.innerHTML = '<div class="loading-wrap" style="color:var(--red);font-size:.85rem;line-height:1.8">'
        + '❌ Firestore 讀取失敗<br>'
        + '錯誤：' + e.message + '<br>'
        + '代碼：' + e.code + '<br><br>'
        + '請確認 Firestore 安全規則已允許讀取，然後<br>'
        + '<button onclick="location.reload()" style="margin-top:8px;padding:8px 16px;border:none;border-radius:8px;background:var(--blue);color:white;font-weight:700;cursor:pointer">🔄 重新整理</button>'
        + '</div>';
    });
}

function showFirebaseError(msg) {
  var wrap = document.getElementById('student-list-wrap');

// ══ 分頁切換 ══
function switchTab(tab) {
  ['overview','lesson','curriculum'].forEach(function(t) {
    document.getElementById('panel-'+t).style.display = t===tab ? '' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  document.getElementById('panel-student').style.display = 'none';
  if (tab === 'overview')   loadStudents();
  if (tab === 'lesson')     loadCurrentLesson();
  if (tab === 'curriculum') loadVersions();
}

// ══ 載入學生列表 ══
function loadStudents() {
  var wrap = document.getElementById('student-list-wrap');
  if (!db) {
    wrap.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><br>連線中…</div>';
    setTimeout(loadStudents, 600); return;
  }
  wrap.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><br>載入中…</div>';

  db.collection('students').get().then(function(snap) {
    // 先收集所有學生基本資料
    var studentDocs = [];
    snap.forEach(function(doc) {
      studentDocs.push({ id: doc.id, data: doc.data() });
    });

    if (!studentDocs.length) {
      renderStudentList([]);
      return;
    }

    // 逐一讀取 progress，用 .catch 確保單一失敗不影響全體
    var students = [];
    var done = 0;

    studentDocs.forEach(function(s) {
      db.collection('students').doc(s.id)
        .collection('progress').doc('hanzi').get()
        .then(function(pd) {
          students.push({
            id:        s.id,
            name:      s.data.name || s.id,
            lastSeen:  pd.exists && pd.data().lastSeen ? pd.data().lastSeen : null,
            charStatus:pd.exists ? (pd.data().charStatus || {}) : {}
          });
        })
        .catch(function() {
          students.push({
            id: s.id, name: s.data.name || s.id,
            lastSeen: null, charStatus: {}
          });
        })
        .then(function() {
          done++;
          if (done === studentDocs.length) {
            students.sort(function(a,b){
              var at = a.lastSeen ? a.lastSeen.seconds : 0;
              var bt = b.lastSeen ? b.lastSeen.seconds : 0;
              return bt - at;
            });
            renderStudentList(students);
          }
        });
    });
  }).catch(function(e) {
    wrap.innerHTML = '<div class="loading-wrap" style="color:var(--red)">載入失敗：'
      + e.message + '<br><br><button onclick="loadStudents()" style="padding:6px 14px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-size:.85rem">重試</button></div>';
  });
}

function renderStudentList(students) {
  var wrap = document.getElementById('student-list-wrap');

  // 統計
  var total    = students.length;
  var today    = new Date(); today.setHours(0,0,0,0);
  var active   = students.filter(function(s){
    return s.lastSeen && s.lastSeen.seconds * 1000 > today.getTime();
  }).length;
  var totalMastered = students.reduce(function(acc,s){
    return acc + Object.values(s.charStatus).filter(function(v){ return v==='mastered'; }).length;
  }, 0);
  var avgMastered = total ? Math.round(totalMastered/total) : 0;

  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-active').textContent   = active;
  document.getElementById('stat-mastered').textContent = avgMastered;

  if (!total) {
    wrap.innerHTML = '<div class="loading-wrap">還沒有學生資料。</div>';
    return;
  }

  var rows = students.map(function(s) {
    var cs      = s.charStatus;
    var keys    = Object.keys(cs);
    var mastered = keys.filter(function(k){ return cs[k]==='mastered'; }).length;
    var total_c  = keys.length || 1;
    var pct      = Math.round(mastered/total_c*100);
    var lastStr  = s.lastSeen
      ? new Date(s.lastSeen.seconds*1000).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';
    var badge = mastered===total_c && total_c>0
      ? '<span class="badge badge-green">全部掌握</span>'
      : mastered>0
        ? '<span class="badge badge-yellow">學習中</span>'
        : '<span class="badge badge-gray">未開始</span>';

    return '<tr onclick="showStudentDetail(\''+s.id+'\')">'
      +'<td><strong>'+s.name+'</strong></td>'
      +'<td>'+badge+'</td>'
      +'<td>'
      +'  <div style="display:flex;align-items:center;gap:8px">'
      +'    <div class="progress-mini"><div class="progress-mini-fill" style="width:'+pct+'%"></div></div>'
      +'    <span style="font-size:.8rem;color:var(--muted)">'+mastered+'/'+keys.length+' 字</span>'
      +'  </div>'
      +'</td>'
      +'<td style="color:var(--muted);font-size:.82rem">'+lastStr+'</td>'
      +'<td style="color:var(--blue);font-size:.82rem;font-weight:700">查看詳細 →</td>'
      +'</tr>';
  }).join('');

  wrap.innerHTML = '<table class="student-table">'
    +'<thead><tr><th>姓名</th><th>狀態</th><th>掌握進度</th><th>最後登入</th><th></th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>';

  var now = new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-update').textContent = '更新於 '+now;
}

// ══ 學生詳細頁 ══
var allStudentsCache = [];

var currentDetailId = null;
var currentDetailCS = {};

function showStudentDetail(studentId) {
  if (!db) return;
  currentDetailId = studentId;
  document.getElementById('panel-overview').style.display = 'none';
  document.getElementById('panel-student').style.display  = '';

  db.collection('students').doc(studentId).get().then(function(doc) {
    var data = doc.data();
    var name = data.name || studentId;
    var pin  = data.pin  || '—';
    document.getElementById('detail-avatar').textContent = name.charAt(0);
    document.getElementById('detail-name').textContent   = name;
    document.getElementById('detail-pin').textContent    = pin;
    return db.collection('students').doc(studentId)
      .collection('progress').doc('hanzi').get();
  }).then(function(pd) {
    var cs       = pd.exists ? (pd.data().charStatus||{}) : {};
    var lastSeen = pd.exists && pd.data().lastSeen
      ? new Date(pd.data().lastSeen.seconds*1000).toLocaleString('zh-TW')
      : '尚未使用';
    var chars    = Object.keys(cs);
    var mastered = chars.filter(function(c){ return cs[c]==='mastered'; }).length;
    document.getElementById('detail-sub').textContent =
      '最後登入：'+lastSeen+'　｜　已掌握 '+mastered+' / '+chars.length+' 個字';
    currentDetailCS = JSON.parse(JSON.stringify(cs));
    if (!chars.length) {
      document.getElementById('detail-chars').innerHTML =
        '<div style="color:var(--muted);font-size:.88rem;font-weight:600;padding:12px 0">這位學生還沒有學習紀錄。</div>';
      return;
    }
    renderDetailChars();
  });
}

function renderDetailChars() {
  var order = ['mastered','practiced','new'];
  var chars = Object.keys(currentDetailCS).sort(function(a,b){
    return order.indexOf(currentDetailCS[a]||'new') - order.indexOf(currentDetailCS[b]||'new');
  });
  document.getElementById('detail-chars').innerHTML = chars.map(function(c) {
    var st  = currentDetailCS[c] || 'new';
    var lbl = {mastered:'已掌握', practiced:'練習中', new:'未學習'}[st];
    return '<div class="char-status-item '+st+'" onclick="cycleCharStatus(\''+c+'\')">'
      +'<div class="char-glyph">'+c+'</div>'
      +'<div class="char-lbl">'+lbl+'</div></div>';
  }).join('');
}

function cycleCharStatus(c) {
  var cycle = {mastered:'practiced', practiced:'new', new:'mastered'};
  currentDetailCS[c] = cycle[currentDetailCS[c]||'new'];
  renderDetailChars();
}

function saveCharStatus() {
  if (!db || !currentDetailId) return;
  db.collection('students').doc(currentDetailId)
    .collection('progress').doc('hanzi')
    .set({ charStatus: currentDetailCS }, { merge:true })
    .then(function(){ showToast('✅ 學習狀態已儲存！'); })
    .catch(function(e){ showToast('❌ 儲存失敗：'+e.message); });
}

function deleteStudent() {
  if (!currentDetailId) return;
  var name = document.getElementById('detail-name').textContent;
  if (!confirm('確定要刪除「'+name+'」的所有資料嗎？\n\n此操作無法復原！')) return;
  db.collection('students').doc(currentDetailId)
    .collection('progress').doc('hanzi').delete()
    .then(function(){
      return db.collection('students').doc(currentDetailId).delete();
    }).then(function(){
      showToast('🗑 已刪除「'+name+'」的資料。');
      backToOverview();
      loadStudents();
    }).catch(function(e){ showToast('❌ 刪除失敗：'+e.message); });
}

function backToOverview() {
  document.getElementById('panel-student').style.display  = 'none';
  document.getElementById('panel-overview').style.display = '';
}

// ══ 生字設定 ══
function loadCurrentLesson() {
  if (!db) { setTimeout(loadCurrentLesson, 500); return; }
  db.collection('settings').doc('lesson').get().then(function(doc) {
    var el = document.getElementById('current-lesson-display');
    if (doc.exists && doc.data().chars && doc.data().chars.length) {
      var chars   = doc.data().chars;
      var updated = doc.data().updatedAt
        ? new Date(doc.data().updatedAt.seconds*1000).toLocaleString('zh-TW')
        : '';
      el.innerHTML = '<div class="current-lesson-banner">'
        +'<span style="font-size:1.1rem">📋</span>'
        +'<div>'
        +'<div style="font-size:.82rem;font-weight:700">目前生字（'+updated+' 設定）</div>'
        +'<div style="font-size:1.2rem;letter-spacing:4px;margin-top:4px">'+chars.join('')+'</div>'
        +'</div></div>';
    } else {
      el.innerHTML = '<div style="color:var(--muted);font-size:.88rem;font-weight:600">尚未設定生字。</div>';
    }
  });
}

function updateLessonPreview() {
  var raw    = document.getElementById('lesson-input').value;
  var chars  = Array.from(new Set(raw.replace(/\s/g,'').split('').filter(Boolean)));
  var prev   = document.getElementById('lesson-preview');
  if (!chars.length) {
    prev.innerHTML = '<span class="lesson-empty">輸入文字後這裡會顯示預覽</span>';
    return;
  }
  prev.innerHTML = chars.map(function(c){
    return '<div class="lesson-char-chip">'+c+'</div>';
  }).join('');
}

function saveLesson() {
  if (!db) { showToast('系統連線中，請稍候…'); return; }
  var raw   = document.getElementById('lesson-input').value;
  var chars = Array.from(new Set(raw.replace(/\s/g,'').split('').filter(Boolean)));
  if (!chars.length) { showToast('請先輸入生字！'); return; }

  db.collection('settings').doc('lesson').set({
    chars:     chars,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    showToast('✅ 生字已儲存！學生下次登入將自動載入。');
    loadCurrentLesson();
    document.getElementById('lesson-input').value = '';
    document.getElementById('lesson-preview').innerHTML =
      '<span class="lesson-empty">輸入文字後這裡會顯示預覽</span>';
  }).catch(function(e) {
    showToast('❌ 儲存失敗：'+e.message);
  });
}

var currentVersionId   = null;
var currentVersionName = '';
var allVersions        = [];
var csvParsedData      = null;

// ── 載入所有版本 ──
function loadVersions() {
  if (!db) { setTimeout(loadVersions, 500); return; }
  var wrap = document.getElementById('version-list-wrap');
  wrap.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  db.collection('curriculum').get().then(function(snap) {
    allVersions = [];
    snap.forEach(function(doc) {
      allVersions.push({ id: doc.id, name: doc.data().name, lessonCount: doc.data().lessonCount || 0 });
    });

    // 更新版本選單（CSV 上傳用）
    var sel = document.getElementById('csv-version-select');
    sel.innerHTML = '<option value="">— 請先選擇版本 —</option>'
      + allVersions.map(function(v){
          return '<option value="'+v.id+'">'+v.name+'</option>';
        }).join('');

    if (!allVersions.length) {
      wrap.innerHTML = '<div style="color:var(--muted);font-size:.88rem;font-weight:600;padding:8px 0">還沒有課程版本，請先建立。</div>';
      return;
    }

    // 用 DOM 方式建立元素，完全避開 onclick 引號衝突
    wrap.innerHTML = '';
    allVersions.forEach(function(v) {
      var div = document.createElement('div');
      div.className = 'version-item';
      div.id = 'vi-' + v.id;
      div.innerHTML = '<div class="version-name">📚 '+v.name+'</div>'
        +'<div class="version-meta">'+v.lessonCount+' 課</div>'
        +'<div style="font-size:.8rem;color:var(--blue);font-weight:700">查看 →</div>';
      div.addEventListener('click', (function(id, name){
        return function(){ browseVersion(id, name); };
      })(v.id, v.name));
      wrap.appendChild(div);
    });
  }).catch(function(e) {
    wrap.innerHTML = '<div style="color:var(--red);font-size:.88rem">載入失敗。</div>';
  });
}

// ── 新增版本 ──
function showAddVersion() {
  document.getElementById('add-version-form').style.display = '';
  document.getElementById('new-version-name').focus();
}
function hideAddVersion() {
  document.getElementById('add-version-form').style.display = 'none';

// ── 刪除版本 ──
function deleteVersion() {
  if (!currentVersionId) return;
  if (!confirm('確定要刪除「'+currentVersionName+'」的所有課程資料嗎？\n\n此操作無法復原！')) return;
  db.collection('curriculum').doc(currentVersionId).delete().then(function() {

  }).catch(function(e){ showToast('❌ 刪除失敗：'+e.message); });

// ── 瀏覽版本課程內容 ──
function browseVersion(versionId, versionName) {
  if (!db) return;
  currentVersionId   = versionId;
  currentVersionName = versionName;

  // 更新選中樣式
  document.querySelectorAll('.version-item').forEach(function(el){ el.classList.remove('active'); });
  var vi = document.getElementById('vi-'+versionId);
  if (vi) vi.classList.add('active');

  document.getElementById('browse-version-name').textContent = '📚 ' + versionName;
  var card = document.getElementById('curriculum-browse-card');
  card.style.display = '';
  document.getElementById('curriculum-content').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div></div>';

  db.collection('curriculum').doc(versionId)
    .collection('lessons').orderBy('bookNum').orderBy('lessonNum')
    .get().then(function(snap) {
      if (snap.empty) {
        document.getElementById('curriculum-content').innerHTML =
          '<div style="color:var(--muted);font-size:.88rem;font-weight:600;padding:8px 0">這個版本還沒有課程，請上傳 CSV 匯入。</div>';
        return;
      }

      // 依冊分組
      var books = {};
      snap.forEach(function(doc) {
        var d = doc.data();
        if (!books[d.bookNum]) books[d.bookNum] = [];
        var entry = Object.assign({ id: doc.id }, d); books[d.bookNum].push(entry);
      });

      var container = document.getElementById('curriculum-content');
      container.innerHTML = '';
      Object.keys(books).sort(function(a,b){ return a-b; }).forEach(function(bk) {
        var bookDiv = document.createElement('div');
        bookDiv.className = 'book-section';
        bookDiv.innerHTML = '<div class="book-title">第 '+bk+' 冊</div>';
        books[bk].forEach(function(lesson) {
          var row = document.createElement('div');
          row.className = 'lesson-item';
          row.innerHTML = '<div class="lesson-num">第'+lesson.lessonNum+'課</div>'
            +'<div class="lesson-name">'+lesson.name+'</div>'
            +'<div class="lesson-chars">'+lesson.chars.join('')+'</div>'
            +'<div class="lesson-actions"></div>';
          var delBtn = document.createElement('button');
          delBtn.className = 'btn-tiny';
          delBtn.textContent = '🗑';
          delBtn.addEventListener('click', (function(vid, lid){
            return function(){ deleteLesson(vid, lid); };
          })(versionId, lesson.id));
          row.querySelector('.lesson-actions').appendChild(delBtn);
          bookDiv.appendChild(row);
        });
        container.appendChild(bookDiv);
      });
    });
}

// ── 刪除單一課 ──
function deleteLesson(versionId, lessonId) {
  if (!confirm('確定要刪除這一課嗎？')) return;
  db.collection('curriculum').doc(versionId)
    .collection('lessons').doc(lessonId).delete()
    .then(function() {
      showToast('🗑 已刪除。');
      browseVersion(versionId, currentVersionName);
    });
}

// ── CSV 選擇 ──
function onCSVSelected() {
  var file = document.getElementById('csv-file').files[0];
  if (!file) return;
  document.getElementById('csv-filename').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e) {
    parseCSV(e.target.result);
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSV(text) {
  var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  if (!lines.length) { showToast('CSV 檔案是空的！'); return; }

  // 跳過標題行
  var start = 0;
  if (lines[0].includes('冊') || lines[0].includes('課')) start = 1;

  var parsed = [];
  var errors = [];
  lines.slice(start).forEach(function(line, idx) {
    var cols = line.split(',');
    if (cols.length < 4) { errors.push('第 '+(idx+start+1)+' 行格式錯誤'); return; }
    var bookNum   = parseInt(cols[0].trim());
    var lessonNum = parseInt(cols[1].trim());
    var name      = cols[2].trim();
    var chars     = Array.from(new Set(cols[3].trim().replace(/\s/g,'').split('').filter(Boolean)));
    if (isNaN(bookNum) || isNaN(lessonNum)) { errors.push('第 '+(idx+start+1)+' 行冊/課必須是數字'); return; }
    if (!chars.length) { errors.push('第 '+(idx+start+1)+' 行生字不能是空的'); return; }
    parsed.push({ bookNum: bookNum, lessonNum: lessonNum, name: name, chars: chars });
  });

  csvParsedData = parsed;

  // 預覽
  var preview = document.getElementById('csv-preview');
  if (errors.length) {
    preview.innerHTML = '<div style="color:var(--red);font-size:.82rem;font-weight:700;background:#fff5f5;border-radius:8px;padding:10px 12px">'
      +'⚠️ 發現以下問題：<br>'+errors.join('<br>')+'</div>';
    document.getElementById('btn-import-csv').disabled = true;
    document.getElementById('btn-import-csv').style.opacity = '.5';
    document.getElementById('btn-import-csv').style.cursor = 'not-allowed';
    return;
  }

  preview.innerHTML = '<div style="color:var(--green);font-size:.82rem;font-weight:700;background:var(--green-lt);border-radius:8px;padding:10px 12px">'
    +'✅ 解析成功！共 '+parsed.length+' 課，'
    +parsed.reduce(function(a,b){ return a+b.chars.length; },0)+' 個生字。<br>'
    +'<span style="color:var(--muted)">請選擇版本後按「匯入」。</span>'
    +'</div>';

  var btn = document.getElementById('btn-import-csv');
  btn.disabled = false;
  btn.style.opacity = '1';
  btn.style.cursor = 'pointer';
}

// ── CSV 匯入到 Firebase ──
function importCSV() {
  var versionId = document.getElementById('csv-version-select').value;
  if (!versionId)      { showToast('請先選擇版本！'); return; }
  if (!csvParsedData || !csvParsedData.length) { showToast('請先選擇 CSV 檔案！'); return; }
  if (!db) return;

  var btn = document.getElementById('btn-import-csv');
  btn.innerHTML = '<span>⏳</span><span>匯入中…</span>';
  btn.disabled = true;

  // 批次寫入（每課一筆文件）
  var batch   = db.batch();
  var colRef  = db.collection('curriculum').doc(versionId).collection('lessons');
  csvParsedData.forEach(function(lesson) {
    var docRef = colRef.doc('b'+lesson.bookNum+'_l'+lesson.lessonNum);
    batch.set(docRef, {
      bookNum:   lesson.bookNum,
      lessonNum: lesson.lessonNum,
      name:      lesson.name,
      chars:     lesson.chars
    });
  });

  // 更新版本的課數
  batch.update(db.collection('curriculum').doc(versionId), {
    lessonCount: csvParsedData.length
  });

  batch.commit().then(function() {
    showToast('✅ 匯入完成！共 '+csvParsedData.length+' 課。');
    btn.innerHTML = '<span>📥</span><span>匯入</span>';
    csvParsedData = null;
    document.getElementById('csv-file').value = '';
    document.getElementById('csv-filename').textContent = '選擇 CSV 檔案';
    document.getElementById('csv-preview').innerHTML = '';
    loadVersions();
    if (currentVersionId === versionId) {
      browseVersion(versionId, currentVersionName);
    }
  }).catch(function(e) {
    showToast('❌ 匯入失敗：'+e.message);
    btn.innerHTML = '<span>📥</span><span>匯入</span>';
    btn.disabled = false;
  });
}

// ══ Toast ══
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
</script>
