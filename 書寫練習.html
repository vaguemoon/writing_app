<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字書寫練習</title>
    <style>:root {
    --primary-color: #2684FF; /* A calmer, modern blue */
    --secondary-color: #6c757d;
    --background-color: #f5f5f5; /* Soft grey, easy on the eyes */
    --container-bg: #ffffff;
    --border-color: #dee2e6;
    --text-color: #212529;
    --highlight-color: #2684FF; /* Changed from magenta to the new blue */
    --error-color: #dc3545;
    --success-color: #28a745; /* Green for success */
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--background-color);
    color: var(--text-color);
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
}

.app-header {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
}

#char-input {
    flex-grow: 1;
    padding: 10px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    font-size: 16px;
}

#start-btn {
    padding: 10px 20px;
    border: none;
    background-color: var(--primary-color);
    color: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.2s;
}
#start-btn:hover {
    background-color: #0056b3;
}

.main-content {
    flex-grow: 1;
    display: flex;
    gap: 16px;
    min-height: 0; /* Critical for nested flex layouts */
}

.char-list-container {
    flex-basis: 200px;
    flex-shrink: 0;
    padding: 16px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background-color: var(--container-bg);
    overflow-y: auto;
}

.char-list-container h3 {
    margin-bottom: 12px;
    text-align: center;
}

#char-list {
    list-style: none;
}

#char-list li {
    padding: 8px;
    text-align: center;
    font-size: 24px;
    cursor: pointer;
    border-radius: 4px;
    transition: background-color 0.2s, color 0.2s;
}

#char-list li:hover {
    background-color: #f0f0f0;
}

#char-list li.active {
    background-color: var(--primary-color);
    color: white;
    font-weight: bold;
}

.writer-section {
    position: relative;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0; /* Critical for nested flex layouts */
}

.writer-target {
    flex-grow: 1;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background-color: var(--container-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    min-height: 200px; /* Ensure it's visible even when empty */
    position: relative;

    /* A single large "Jiu Gong Ge" (九宮格) - Corrected Method */
    --line-color: #cccccc; /* Grid line color */
    background-image:
        /* Horizontal lines */
        linear-gradient(var(--line-color) 1px, transparent 1px),
        linear-gradient(var(--line-color) 1px, transparent 1px),
        /* Vertical lines */
        linear-gradient(to right, var(--line-color) 1px, transparent 1px),
        linear-gradient(to right, var(--line-color) 1px, transparent 1px);
    background-repeat: no-repeat;
    background-size:
        /* Size for horizontal lines */
        100% 1px,
        100% 1px,
        /* Size for vertical lines */
        1px 100%,
        1px 100%;
    background-position:
        /* Position for horizontal lines */
        0 33.3%,
        0 66.6%,
        /* Position for vertical lines */
        33.3% 0,
        66.6% 0;
}

.writer-target.error-flash {
    animation: flash-red 0.4s;
}

@keyframes flash-red {
    50% { box-shadow: 0 0 12px 4px rgba(220, 53, 69, 0.7); }
}

.writer-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
}

.stage-btn {
    padding: 8px 16px;
    border: 1px solid var(--border-color);
    background-color: var(--container-bg);
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.2s, color 0.2s;
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
}

.stage-btn.active {
    background-color: var(--primary-color);
    color: white;
    border-color: var(--primary-color);
}

/* Dialog styles */
.dialog-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.dialog-box {
    background-color: white;
    padding: 32px;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.dialog-box p {
    font-size: 1.2rem;
    margin-bottom: 24px;
}

.dialog-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
}

.dialog-buttons button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
}

#confirm-completion-btn {
    background-color: var(--primary-color);
    color: white;
}

#practice-again-btn {
    background-color: #6c757d;
    color: white;
}

/* Responsive Design */
@media (max-width: 768px) {
    .app-container {
        padding: 8px;
    }

    .main-content {
        flex-direction: column;
    }

    .char-list-container {
        flex-basis: auto; /* Allow it to shrink */
        max-height: 150px;
    }

    .writer-controls {
        flex-wrap: wrap;
    }
}

/* Completion feedback animation */
.completion-feedback {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0); /* Initially hidden */
    font-size: 25rem; /* Greatly increased size */
    color: var(--success-color); /* Use green success color */
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; /* Make sure it doesn't block clicks */
    z-index: 500;
    line-height: 1; /* Adjust line height for large font */
}

.completion-feedback.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    animation: fade-out-up 1.5s forwards;
}

@keyframes fade-out-up {
    0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    40% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -70%) scale(1.2);
    }
}

/* --- Theme Switch --- */
.theme-switch-container {
    display: flex;
    align-items: center;
    gap: 8px;
}

.theme-switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
}

.theme-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 28px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 4px;
    bottom: 4px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: var(--primary-color);
}

input:checked + .slider:before {
    transform: translateX(22px);
}

/* --- Dark Mode --- */
body.dark-mode {
    --background-color: #121212;
    --container-bg: #1e1e1e;
    --border-color: #333;
    --text-color: #e0e0e0;
    --primary-color: #FFEB3B; /* Bright yellow for high contrast */
    --highlight-color: #FFEB3B; /* Bright yellow for high contrast */
    --secondary-color: #868e96;
}

body.dark-mode #char-list li:hover {
    background-color: #2c2c2c;
}

body.dark-mode #char-list li.active {
    background-color: var(--primary-color);
    color: #1f1f1f; /* Dark text on bright yellow */
}

body.dark-mode .writer-target {
    --line-color: #444; /* Darker grid lines */
}

body.dark-mode .stage-btn {
    background-color: var(--container-bg);
    border-color: #555;
}

body.dark-mode .stage-btn.active {
     background-color: var(--primary-color);
     color: #1f1f1f; /* Dark text on bright yellow */
     border-color: var(--primary-color);
}

body.dark-mode .dialog-box {
    background-color: var(--container-bg);
}

body.dark-mode input:checked + .slider {
    background-color: var(--primary-color);
}

</script>
</head>
<body>

    <div class="app-container">
        <header class="app-header"><h1>生字練習：市倫決糾紛律改挖設議員付費建</h1>
<div class="theme-switch-container">
                <label class="theme-switch" for="theme-checkbox">
                    <input type="checkbox" id="theme-checkbox" />
                    <div class="slider round"></div></header>

        <main class="main-content">
            <aside class="char-list-container">
                <h3>生字清單</h3>
                <ul id="char-list"></ul>
            </aside>

            <section class="writer-section">
                <div id="writer-target" class="writer-target">
                    <!-- 漢字書寫畫布將會顯示在這裡 -->
                </div>
                <div id="completion-feedback" class="completion-feedback">○</div>
                <div class="writer-controls">
                    <button id="erase-btn" class="stage-btn">清除</button>
                    <button id="play-sound-btn" class="stage-btn">🔊</button>
                    <div class="slider-container">
                        <label for="stroke-width-slider">粗細</label>
                        <input type="range" id="stroke-width-slider" min="5" max="30" value="10">
                    </div>
                    <button id="stage-1-btn" class="stage-btn active">提示</button>
                    <button id="stage-3-btn" class="stage-btn">挑戰</button>
                </div>
            </section>
        </main>
    </div>

    <div id="completion-dialog" class="dialog-overlay" style="display: none;">
        <div class="dialog-box">
            <p>太棒了！</p>
            <div class="dialog-buttons">
                <button id="practice-again-btn">再寫一次</button>
            </div>
        </div>
    </div>

    <script>
      window.preloadedCharacters = "市倫決糾紛律改挖設議員付費建";
    </script>
    <script>document.addEventListener('DOMContentLoaded', () => {
    // --- DOM Elements ---
    const themeCheckbox = document.getElementById('theme-checkbox');
    const body = document.body;
    const charInput = document.getElementById('char-input');
    const startBtn = document.getElementById('start-btn');
    const charList = document.getElementById('char-list');
    const writerTarget = document.getElementById('writer-target');
    const stage1Btn = document.getElementById('stage-1-btn');
    const stage3Btn = document.getElementById('stage-3-btn');
    const eraseBtn = document.getElementById('erase-btn');
    const playSoundBtn = document.getElementById('play-sound-btn');
    const strokeWidthSlider = document.getElementById('stroke-width-slider');
    const completionDialog = document.getElementById('completion-dialog');
    const practiceAgainBtn = document.getElementById('practice-again-btn');
    const completionFeedback = document.getElementById('completion-feedback');
    const completionSound = document.getElementById('completion-sound');

    // --- App State ---
    let writer = null;
    let characters = [];
    let currentCharacterIndex = -1;
    let currentStage = 1;
    let hasUsedHint = false;
    
    // --- Theme Initialization ---
    function applyTheme(isDarkMode) {
        body.classList.toggle('dark-mode', isDarkMode);
        themeCheckbox.checked = isDarkMode;
        
        // Update HanziWriter colors if it exists
        if (writer) {
            const highlightColor = getComputedStyle(document.documentElement).getPropertyValue('--highlight-color').trim();
            const outlineColor = isDarkMode ? '#444' : '#f0f0f0';
            writer.updateColor('strokeColor', highlightColor, {
                duration: 300
            });
            writer.updateColor('outlineColor', outlineColor, {
                duration: 300
            });
        }
    }

    themeCheckbox.addEventListener('change', () => {
        const isDarkMode = themeCheckbox.checked;
        localStorage.setItem('darkMode', isDarkMode);
        applyTheme(isDarkMode);
    });

    // Load theme from local storage
    const savedDarkMode = localStorage.getItem('darkMode') === 'true';
    applyTheme(savedDarkMode);

    // --- Core Functions ---

    function speakCharacter(char) {
        if ('speechSynthesis' in window && char) {
            // Cancel any previous speech to avoid overlap
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(char);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8; // Slow down the speech slightly
            window.speechSynthesis.speak(utterance);
        }
    }

    function renderCharList() {
        charList.innerHTML = '';
        characters.forEach((char, index) => {
            const listItem = document.createElement('li');
            listItem.textContent = char;
            listItem.dataset.index = index;
            if (index === currentCharacterIndex) {
                listItem.classList.add('active');
            }
            listItem.addEventListener('click', () => {
                speakCharacter(char);
                selectCharacter(index);
            });
            charList.appendChild(listItem);
        });
    }

    function loadCharacter(char) {
        writerTarget.innerHTML = '';
        hasUsedHint = false; // Reset hint status for the new character
        
        const size = Math.min(writerTarget.clientWidth, writerTarget.clientHeight);
        const strokeWidth = strokeWidthSlider.value / 10;

        writer = HanziWriter.create(writerTarget, char, {
            width: size,
            height: size,
            padding: 5,
            showCharacter: false,
            showOutline: true,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 100,
            strokeWidth: strokeWidth,
            
            strokeColor: getComputedStyle(document.documentElement).getPropertyValue('--highlight-color').trim(),
            highlightColor: getComputedStyle(document.documentElement).getPropertyValue('--highlight-color').trim(),
            outlineColor: '#f0f0f0',
        });
        
        // Speak the character *after* the writer is created to avoid race conditions
        speakCharacter(char); 
        
        setStage(1); // Always start a new character on stage 1
    }
    
    function selectCharacter(index) {
        if (index < 0 || index >= characters.length) {
            writer = null;
            writerTarget.innerHTML = '<h3>🎉 恭喜，全部練習完成！ 🎉</h3>';
            characters = [];
            currentCharacterIndex = -1;
            renderCharList();
            return;
        };
        currentCharacterIndex = index;
        renderCharList();
        loadCharacter(characters[currentCharacterIndex]);
    }

    function startPractice() {
        const inputText = charInput.value.trim();
        if (!inputText) return;
        characters = [...new Set(inputText.split(''))];
        if (characters.length > 0) {
            selectCharacter(0);
        } else {
            writer = null;
            writerTarget.innerHTML = '';
            characters = [];
            currentCharacterIndex = -1;
            renderCharList();
        }
    }

    function startQuiz() {
        if (!writer) return;
        writer.quiz({
            onMistake: () => {
                if (navigator.vibrate) navigator.vibrate(200);
                writerTarget.classList.add('error-flash');
                setTimeout(() => writerTarget.classList.remove('error-flash'), 400);
            },
            onComplete: handleCharCompletion
        });
    }

    function setStage(stage) {
        if (!writer) return;

        if (currentStage === 3 && stage === 1) {
            hasUsedHint = true;
        }

        currentStage = stage;
        
        // Update button active states
        stage1Btn.classList.toggle('active', currentStage === 1);
        stage3Btn.classList.toggle('active', currentStage === 3);

        const highlightColor = getComputedStyle(document.documentElement).getPropertyValue('--highlight-color').trim();
        switch (stage) {
            case 1:
                writer.updateColor('strokeColor', highlightColor);
                writer.updateColor('outlineColor', '#f0f0f0');
                writer.showOutline();
                break;
            case 3:
                writer.hideOutline();
                break;
        }
        startQuiz();
    }

    function handleCharCompletion() {
        // --- Play sound and show visual feedback ---
        if (completionSound) {
            completionSound.load();
            completionSound.play().catch(e => console.error("Audio playback failed.", e));
        }
        completionFeedback.classList.add('show');
        
        const feedbackDuration = 1500;
        setTimeout(() => {
            completionFeedback.classList.remove('show');
        }, feedbackDuration);

        // --- New Automatic Progression Logic ---
        setTimeout(() => {
            if (currentStage === 1) {
                // If hint stage is complete, automatically move to challenge stage
                setStage(3);
            } else if (currentStage === 3) {
                if (hasUsedHint) {
                    // If challenge is complete but hint was used, show dialog to try again
                    completionDialog.style.display = 'flex';
                } else {
                    // If challenge is complete without hint, automatically move to the next character
                    removeCurrentCharAndSelectNext();
                }
            }
        }, 500); // Small delay after feedback to feel natural
    }

    function removeCurrentCharAndSelectNext() {
        if (currentCharacterIndex < 0) return;

        characters.splice(currentCharacterIndex, 1);
        
        if (currentCharacterIndex >= characters.length) {
            currentCharacterIndex = 0;
        }
        
        selectCharacter(currentCharacterIndex);
    }

    // --- Event Listeners & Initialization ---
    function main() {
        // Priority 1: Check for preloaded characters (for packaged version)
        if (window.preloadedCharacters && typeof window.preloadedCharacters === 'string' && window.preloadedCharacters.length > 0) {
            characters = [...new Set(window.preloadedCharacters.split(''))];
            
            // Use a timeout to ensure the writer container's dimensions are calculated correctly.
            setTimeout(() => {
                if (writerTarget.clientWidth > 0) {
                    selectCharacter(0);
                } else {
                    console.warn("Writer target not ready, trying again in 300ms.");
                    setTimeout(() => selectCharacter(0), 300);
                }
            }, 100);
            return; // End here for packaged mode.
        }

        // Priority 2: Fallback to interactive mode for local development.
        // Defensively check if the elements exist before adding listeners.
        if (startBtn && charInput) {
            startBtn.addEventListener('click', startPractice);
            charInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') startPractice();
            });
        }
    }

    main(); // Run the main initialization logic

    stage1Btn.addEventListener('click', () => setStage(1));
    stage3Btn.addEventListener('click', () => setStage(3));

    eraseBtn.addEventListener('click', () => {
        if (writer) {
            startQuiz();
        }
    });

    playSoundBtn.addEventListener('click', () => {
        if (currentCharacterIndex > -1) {
            speakCharacter(characters[currentCharacterIndex]);
        }
    });

    strokeWidthSlider.addEventListener('input', (e) => {
        if (writer) {
            const newWidth = e.target.value / 10;
            writer.updateOptions({ strokeWidth: newWidth });
        }
    });

    practiceAgainBtn.addEventListener('click', () => {
        completionDialog.style.display = 'none';
        loadCharacter(characters[currentCharacterIndex]);
    });

    window.addEventListener('resize', () => {
        if (writer) {
            const size = Math.min(writerTarget.clientWidth, writerTarget.clientHeight);
            writer.updateDimensions({ width: size, height: size });
        }
    });
});
</script>
