<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字書寫練習</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <input type="text" id="char-input" placeholder="請輸入生字，例如：學習勤奮">
            <button id="start-btn">開始練習</button>
            <div class="theme-switch-container">
                <label class="theme-switch" for="theme-checkbox">
                    <input type="checkbox" id="theme-checkbox" />
                    <div class="slider round"></div>
                </label>
                <span>暗色</span>
            </div>
        </header>

        <main class="main-content">
            <aside class="char-list-container">
                <h3>生字清單</h3>
                <ul id="char-list"></ul>
            </aside>

            <section class="writer-section">
                <div id="writer-target" class="writer-target">
                    <!-- 漢字書寫畫布將會顯示在這裡 -->
                </div>
                <div id="completion-feedback" class="completion-feedback">○</div>
                <div class="writer-controls">
                    <button id="erase-btn" class="stage-btn">清除</button>
                    <button id="play-sound-btn" class="stage-btn">🔊</button>
                    <div class="slider-container">
                        <label for="stroke-width-slider">粗細</label>
                        <input type="range" id="stroke-width-slider" min="5" max="30" value="10">
                    </div>
                    <button id="stage-1-btn" class="stage-btn active">提示</button>
                    <button id="stage-3-btn" class="stage-btn">挑戰</button>
                </div>
            </section>
        </main>
    </div>

    <div id="completion-dialog" class="dialog-overlay" style="display: none;">
        <div class="dialog-box">
            <p>太棒了！</p>
            <div class="dialog-buttons">
                <button id="practice-again-btn">再寫一次</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

    <audio id="completion-sound" src="D:\github\writing_app\CorrectSound.mp3" preload="auto"></audio>
</body>
</html>
